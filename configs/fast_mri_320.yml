data:
    dataset: "fast_mri"
    category: ""
    image_size: 320
    channels: 2
    num_workers: 8

model:
    in_channels: 2
    model_channels: 256
    out_channels: 2
    num_res_blocks: 2
    attention_resolutions: [32, 16, 8]
    dropout: 0.0
    channel_mult: [1, 1, 2, 2, 4, 4]
    use_fp16: False
    num_heads: 4
    num_head_channels: 64
    num_heads_upsample: -1
    use_scale_shift_norm: false
    resblock_updown: true
    use_new_attention_order: false
    class_cond: false

diffusion:
    beta_schedule: linear 
    beta_start: 0.0001 
    beta_end: 0.02 
    num_diffusion_timesteps: 1000

sampling:
    batch_size: 1